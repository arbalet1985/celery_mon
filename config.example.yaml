# Celery monitor configuration

celery:
  # Path to Celery app (same as -A)
  app: "your_project.celery:app"

zabbix:
  server: "zabbix.example.com"
  port: 10051
  hostname: "celery-production-1"
  # When true, on send failure re-send each item individually to identify which keys fail
  debug_failed_items: false

# Send interval in seconds (daemon mode)
interval: 60

# Discovery interval in seconds (tasks, queues, workers). 0 = disabled.
# Daemon sends LLD via trapper; no Zabbix agent UserParameter needed.
discovery_interval: 3600

# Optional: limit to specific queues (empty = all from app.conf)
queues: []

# Optional: limit to specific tasks (empty = all)
tasks: []
